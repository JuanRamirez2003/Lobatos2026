<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Lobatos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
  <h2>Manada Scout</h2>
  <ul>
    <li onclick="irA('dashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
    <li class="active"><i class="fas fa-child"></i> Lobatos</li>
    <li onclick="irA('seisenas.html')"><i class="fas fa-users"></i> Seisenas</li>
    <li onclick="irA('actividades.html')"><i class="fas fa-calendar-alt"></i> Actividades</li>
    <li onclick="irA('asistencia.html')"><i class="fas fa-check-square"></i> Asistencia</li>
  </ul>
</div>

<div class="main-content">
  <h1>Registro de Lobatos</h1>
  <button class="btn" id="btnAgregar">+ Nuevo Lobato</button>

  <table id="tablaLobatos">
    <thead>
      <tr>
        <th>Nombre completo</th>
        <th>Apodo</th>
        <th>Edad</th>
        <th>Sexo</th>
        <th>Seisena</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal" id="modalLobato">
  <div class="modal-content">
    <span class="close" id="cerrarModal">&times;</span>
    <h2>Agregar / Editar Lobato</h2>
    <form id="formLobato">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" required>
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" id="apellido" required>
      </div>
      <div class="form-group">
        <label>Apodo scout</label>
        <input type="text" id="apodo">
      </div>
      <div class="form-group">
        <label>Fecha de nacimiento</label>
        <input type="date" id="fechaNacimiento" required>
      </div>
      <div class="form-group">
        <label>Sexo</label>
        <select id="sexo">
          <option value="Masculino">Masculino</option>
          <option value="Femenino">Femenino</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Foto del niño (URL)</label>
        <input type="text" id="foto">
      </div>
      <div class="form-group">
        <label>Fecha de ingreso</label>
        <input type="date" id="fechaIngreso">
      </div>
      <div class="form-group">
        <label>Seisena</label>
        <select id="seisena">
          <!-- Se llenará automáticamente con JS -->
        </select>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <h3>Datos familiares</h3>
      <div class="form-group"><label>Nombre del padre</label><input type="text" id="padre"></div>
      <div class="form-group"><label>Nombre de la madre</label><input type="text" id="madre"></div>
      <div class="form-group"><label>Teléfono de contacto</label><input type="tel" id="telefono"></div>
      <div class="form-group"><label>Email de contacto</label><input type="email" id="email"></div>
      <div class="form-group"><label>Dirección</label><input type="text" id="direccion"></div>
      <div class="form-group"><label>Contacto de emergencia</label><input type="text" id="contactoEmergencia"></div>

      <h3>Datos médicos</h3>
      <div class="form-group"><label>Alergias</label><input type="text" id="alergias"></div>
      <div class="form-group"><label>Medicación</label><input type="text" id="medicacion"></div>
      <div class="form-group"><label>Restricciones alimentarias</label><input type="text" id="restricciones"></div>
      <div class="form-group"><label>Seguro médico</label><input type="text" id="seguro"></div>

      <button type="submit" class="btn">Guardar Lobato</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lobatos.js"></script>
</body>
</html>
